name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    container:
      image: flyio/flyctl:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Fly.io app (if not exists) and deploy
        run: |
          set -e
          echo "Checking if app exists..."
          flyctl apps list || true

          echo "Deploying..."
          flyctl deploy --remote-only --build-only=false || true

          echo "Done!"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
