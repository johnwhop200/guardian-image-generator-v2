# Fly.io configuration for Guardian Image Generator v2
# Optimized for batch processing 8-9 AM daily
# Cost: ~€0.70/month with auto-stop
app = "guardian-image-generator"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpus = 1
  kind = "shared"
